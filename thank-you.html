<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You're on the list — PromptFlow</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --brand: #5046e5; --text: #111827; --muted: #6b7280; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: var(--text);
      background: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .container { max-width: 480px; }
    .check {
      font-size: 3rem;
      margin-bottom: 24px;
      display: block;
    }
    h1 {
      font-size: 2rem;
      font-weight: 900;
      letter-spacing: -1px;
      margin-bottom: 16px;
    }
    p {
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.7;
      margin-bottom: 32px;
    }
    .back-link {
      color: var(--brand);
      text-decoration: none;
      font-weight: 600;
    }
    .back-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <span class="check">✅</span>
    <h1>You're on the list!</h1>
    <p>We'll email you at launch with your 20% discount code — plus a free AI prompt starter pack as a thank-you for signing up early.</p>
    <a href="/" class="back-link">← Back to PromptFlow</a>
  </div>
</body>
</html>
